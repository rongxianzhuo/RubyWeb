<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 主聊天区域 -->
        <main class="chat-main">
            <!-- 聊天头部 -->
            <header class="chat-header">
                <h1 class="chat-title">
                    <i class="fas fa-robot"></i>
                    Ruby
                </h1>
                <button class="settings-btn" id="settingsBtn" title="设置">
                    <i class="fas fa-cog"></i>
                </button>
            </header>

            <!-- 聊天消息区域 -->
            <div class="chat-messages" id="chatMessages">
                <!-- 欢迎消息 -->
                <div class="welcome-container">
                    <div class="welcome-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h2>欢迎使用 Ruby</h2>
                    <p>输入您的问题，我会尽力为您解答</p>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="chat-input-area">
                <div class="input-container">
                    <textarea 
                        id="chatInput" 
                        placeholder="输入消息... (Enter换行，Shift+Enter发送)"
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" title="发送">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 设置弹窗 -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-modal" id="settingsModal">
        <div class="settings-header">
            <h2><i class="fas fa-cog"></i> API 设置</h2>
        </div>
        <div class="settings-body">
            <label for="apiUrlInput">后端 API 地址</label>
            <input 
                type="url" 
                id="apiUrlInput" 
                placeholder="http://127.0.0.1:5000/chat"
            >
            <p class="settings-hint">输入你的后端 API 地址，设置将保存在本地</p>
        </div>
        <div class="settings-footer">
            <button class="btn-cancel" id="settingsCancelBtn">取消</button>
            <button class="btn-save" id="settingsSaveBtn">保存</button>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
